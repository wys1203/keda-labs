apiVersion: apps/v1
kind: Deployment
metadata:
  name: keda-deprecation-webhook
  namespace: keda-system
  labels:
    app.kubernetes.io/name: keda-deprecation-webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: keda-deprecation-webhook
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keda-deprecation-webhook
    spec:
      serviceAccountName: keda-deprecation-webhook
      containers:
        - name: webhook
          image: keda-deprecation-webhook:dev
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --webhook-port=9443
            - --cert-dir=/etc/webhook/certs
            - --config-map-name=keda-deprecation-webhook-config
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REJECT_MESSAGE_URL
              value: ""
          ports:
            - name: webhook
              containerPort: 9443
            - name: metrics
              containerPort: 8080
            - name: probes
              containerPort: 8081
          livenessProbe:
            httpGet: { path: /healthz, port: probes }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: probes }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 256Mi }
          volumeMounts:
            - name: certs
              mountPath: /etc/webhook/certs
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: kdw-tls
