apiVersion: 1

# Each `datasources` entry is provisioned as a Grafana datasource. The
# dashboards in this repo render through the `datasource` template
# variable, which Grafana populates with every entry whose `type` is
# `prometheus`. Add one entry per cluster you want to switch between in
# the UI's top-bar picker.
#
# Tips:
#   - `uid` is the stable identifier the dashboards reference. Keep it
#     short and stable across restarts (kube-thanos, grafana-cloud-...).
#   - Mark exactly one entry `isDefault: true` — the dashboard variable
#     will land on it when it loads cold.
#   - For an out-of-cluster Prometheus (Grafana Cloud, a remote prom),
#     set `url:` to the public endpoint and add `basicAuth: true` plus
#     `secureJsonData: { basicAuthPassword: ... }`.
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus-server.monitoring.svc.cluster.local
    isDefault: true
    editable: false

  # Example — uncomment and adapt for a second cluster's Prometheus.
  # The dashboard variable will list this alongside the in-cluster one.
  #
  # - name: Prometheus (cluster-b)
  #   uid: prometheus-cluster-b
  #   type: prometheus
  #   access: proxy
  #   url: https://prometheus.cluster-b.example.com
  #   isDefault: false
  #   editable: false
  #   basicAuth: true
  #   basicAuthUser: ${PROM_CLUSTER_B_USER}
  #   secureJsonData:
  #     basicAuthPassword: ${PROM_CLUSTER_B_PASSWORD}
