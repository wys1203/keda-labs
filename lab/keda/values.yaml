# Enabling each `prometheus.*.enabled` flag does three things in the chart:
#   1. Adds `--enable-prometheus-metrics=true` to the operator and similar
#      args to the metrics-apiserver / webhooks.
#   2. Adds a containerPort `metrics:8080` on the relevant pod.
#   3. Adds `prometheus.io/scrape=true,port=8080,path=/metrics` on the
#      Service (NOT on the pods).
#
# We rely on the chart's Service-level annotations + Prometheus'
# `kubernetes-service-endpoints` scrape job to pick the targets up.
#
# The chart additionally hardcodes a pod-level `prometheus.io/scrape="true"`
# on the metrics-apiserver Deployment whenever `prometheus.metricServer.enabled`
# is true. That makes the `kubernetes-pods` scrape job ALSO grab it, so every
# `keda_internal_metricsservice_grpc_client_*` series shows up under TWO jobs
# and `sum()` counts everything twice. Override the pod annotation back to
# "false" so only `kubernetes-service-endpoints` scrapes it. (The Service
# annotation is unaffected.) Operator and webhooks pods don't get the
# hardcoded annotation, so we leave their `podAnnotations` empty.
#
# Note: the metrics-apiserver/operator/webhooks Prometheus collectors are
# registered lazily on first call. `keda_scaler_*` and
# `keda_internal_metricsservice_grpc_*` therefore only appear once a
# ScaledObject with an *external* trigger (Prometheus, queue, etc.) is
# active. CPU/Memory triggers bypass the adapter so those metrics stay
# absent — see manifests/demo-prom for a workload that exercises the path.
prometheus:
  metricServer:
    enabled: true
    port: 8080
    portName: metrics
  operator:
    enabled: true
    port: 8080
    portName: metrics
  webhooks:
    enabled: true
    port: 8080
    portName: metrics

podAnnotations:
  metricsAdapter:
    prometheus.io/scrape: "false"

# Use cert-manager to issue KEDA's webhook/metrics-apiserver TLS certs from a
# self-signed CA, instead of the chart's built-in in-operator generator.
# Requires cert-manager CRDs/controller to be installed in the cluster.
certificates:
  autoGenerated: false
  certManager:
    enabled: true
    generateCA: true
