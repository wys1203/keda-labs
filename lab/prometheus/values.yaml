alertmanager:
  enabled: true
  persistence:
    enabled: false
  service:
    type: ClusterIP
  config:
    route:
      group_by: ['alertname', 'severity']
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 5m
      receiver: stdout-sink
    receivers:
      - name: stdout-sink
        webhook_configs:
          - url: 'http://alert-stdout-sink.monitoring.svc.cluster.local:8080/'
            send_resolved: true

server:
  persistentVolume:
    enabled: false
  global:
    scrape_interval: 30s
    evaluation_interval: 30s

prometheus-pushgateway:
  enabled: false

# Align KEDA workload metrics with production (Prometheus Operator /
# ServiceMonitor) label semantics, while leaving every other scrape alone.
#
# `honor_labels: true` (chart default) means the metric's own labels win
# during scrape, so `kube_pod_info{namespace="demo-cpu"}` keeps its real
# namespace — we want that for kube-state-metrics and cAdvisor.
#
# But KEDA's workload metrics emit their own `namespace=<ScaledObject ns>`,
# which a production ServiceMonitor (honor_labels=false) would rewrite to
# `exported_namespace`, with `namespace` becoming the operator pod's namespace
# (`platform-keda`). We replicate that selectively via `metric_relabel_configs`
# applied only to KEDA workload metric names — leaving every other metric
# (ksm, cAdvisor, generic services) on the default honor_labels=true path.
scrapeConfigs:
  kubernetes-service-endpoints:
    metric_relabel_configs:
      - source_labels: [__name__, namespace]
        regex: '(keda_(?:resource|scaled_object|scaler)_[a-z_]+);(.+)'
        target_label: exported_namespace
        replacement: '$2'
      - source_labels: [__name__]
        regex: 'keda_(?:resource|scaled_object|scaler)_[a-z_]+'
        target_label: namespace
        replacement: 'platform-keda'

kube-state-metrics:
  enabled: true
  # Use the locally preloaded Docker Hardened Image inside kind.
  image:
    registry: dhi.io
    repository: kube-state-metrics
    tag: "2"
  # Expose:
  #   * node labels (topology.kubernetes.io/zone, ...) so dashboards can
  #     join pods/HPAs to their failure domain.
  #   * namespace labels (`prodsuite`) so the dashboards can offer a
  #     "filter by prodsuite" template variable.
  metricLabelsAllowlist:
    - nodes=[topology.kubernetes.io/zone,kubernetes.io/hostname,node-routable]
    - namespaces=[prodsuite]

prometheus-node-exporter:
  enabled: true

# Label conventions used in alert rules and dashboards:
#
#   * `app_kubernetes_io_name` is the only KEDA-component label present on
#     ALL three Service-level scrapes (operator, metrics-apiserver, webhooks).
#     The plain `app` label is missing on operator and webhooks Services, so
#     we don't rely on it.
#
#   * KEDA emits its workload metrics (`keda_resource_registered_total`,
#     `keda_scaled_object_*`, `keda_scaler_*`) with a `namespace` label
#     set to the ScaledObject's namespace. The `metric_relabel_configs`
#     block above rewrites those specific metric names so that — matching
#     production ServiceMonitor semantics —
#         namespace          = platform-keda          (operator pod ns)
#         exported_namespace = <ScaledObject's ns>    (e.g. demo-cpu)
#     Dashboards and alerts therefore group / filter KEDA workload metrics
#     by `exported_namespace`. cAdvisor / kube-state-metrics metrics are
#     untouched (the regex only matches keda_resource/scaled_object/scaler
#     names), so `kube_pod_*{namespace="platform-keda"}` and
#     `container_*{namespace="platform-keda"}` keep working.
serverFiles:
  alerting_rules.yml:
    groups:
      # Platform SLOs for the KEDA control plane.
      #
      # Two SLIs, both expressed as success ratios:
      #
      #   1. reconcile_success — fraction of controller-runtime Reconcile()
      #      calls across the KEDA operator that did NOT return an error.
      #      Target: 99% over 7d (1% error budget).
      #
      #   2. operator_up — fraction of scrapes where the keda-operator pod
      #      was healthy (`up == 1`). Target: 99.9% over 7d (0.1% budget).
      #
      # Each SLI is recorded over four windows (5m, 1h, 6h, 7d) so we can
      # build multi-window multi-burn-rate alerts (Google SRE workbook ch6).
      # The alert pairs below combine a long window (1h or 6h) with a short
      # window (5m or 1h) to suppress alerts on transient blips while still
      # reacting fast to true budget burn.
      #
      # NOTE on selectors: KEDA service-endpoint scrapes land under
      # `job="kubernetes-service-endpoints"`, so a `job=~".*keda.*"` matcher
      # would return zero series. We key off `app_kubernetes_io_name` like
      # every other rule in this file.
      #
      # NOTE on warm-up: the 7d windows return NaN until Prometheus has
      # accumulated enough samples. That's expected on a fresh lab — the
      # rules become valid as the lab ages.
      - name: keda-platform-slo
        interval: 30s
        rules:
          # ------------------------------------------------------------
          # SLI 1: reconcile success ratio
          # ------------------------------------------------------------
          - record: keda:reconcile_success:ratio_rate5m
            expr: |
              1 - (
                sum(rate(controller_runtime_reconcile_errors_total{app_kubernetes_io_name="keda-operator"}[5m]))
                /
                sum(rate(controller_runtime_reconcile_total{app_kubernetes_io_name="keda-operator"}[5m]))
              )

          - record: keda:reconcile_success:ratio_rate1h
            expr: |
              1 - (
                sum(rate(controller_runtime_reconcile_errors_total{app_kubernetes_io_name="keda-operator"}[1h]))
                /
                sum(rate(controller_runtime_reconcile_total{app_kubernetes_io_name="keda-operator"}[1h]))
              )

          - record: keda:reconcile_success:ratio_rate6h
            expr: |
              1 - (
                sum(rate(controller_runtime_reconcile_errors_total{app_kubernetes_io_name="keda-operator"}[6h]))
                /
                sum(rate(controller_runtime_reconcile_total{app_kubernetes_io_name="keda-operator"}[6h]))
              )

          - record: keda:reconcile_success:ratio_rate7d
            expr: |
              1 - (
                sum(rate(controller_runtime_reconcile_errors_total{app_kubernetes_io_name="keda-operator"}[7d]))
                /
                sum(rate(controller_runtime_reconcile_total{app_kubernetes_io_name="keda-operator"}[7d]))
              )

          # ------------------------------------------------------------
          # SLI 2: operator UP ratio (averaged across HA replicas)
          # ------------------------------------------------------------
          - record: keda:operator_up:ratio_rate5m
            expr: avg_over_time(up{app_kubernetes_io_name="keda-operator"}[5m])

          - record: keda:operator_up:ratio_rate1h
            expr: avg_over_time(up{app_kubernetes_io_name="keda-operator"}[1h])

          - record: keda:operator_up:ratio_rate6h
            expr: avg_over_time(up{app_kubernetes_io_name="keda-operator"}[6h])

          - record: keda:operator_up:ratio_rate7d
            expr: avg_over_time(up{app_kubernetes_io_name="keda-operator"}[7d])

          # ------------------------------------------------------------
          # Burn-rate alerts (multi-window, multi-burn-rate)
          # ------------------------------------------------------------
          # Reconcile target: 99% / 7d  ⇒ budget = 1%
          #   fast burn 14.4× ⇒ 0.144 error rate exhausts budget in ~12h
          #   slow burn  6×   ⇒ 0.06  error rate exhausts budget in ~28h
          - alert: KedaPlatformReconcileBudgetBurnFast
            expr: |
              (1 - keda:reconcile_success:ratio_rate1h) > 0.144
              and
              (1 - keda:reconcile_success:ratio_rate5m) > 0.144
            for: 2m
            labels:
              severity: critical
              component: keda-platform-slo
              slo: reconcile_success
            annotations:
              summary: KEDA reconcile SLO is burning error budget fast (14.4x)
              description: |
                The 1h AND 5m error ratios for KEDA Reconcile() are both above
                14.4% — at this rate the entire 7d 1% error budget is consumed
                in ~12 hours. Short window guards against alerting on a stale
                long window; long window guards against alerting on noise.
                Inspect: kubectl -n platform-keda logs deploy/keda-operator

          - alert: KedaPlatformReconcileBudgetBurnSlow
            expr: |
              (1 - keda:reconcile_success:ratio_rate6h) > 0.06
              and
              (1 - keda:reconcile_success:ratio_rate1h) > 0.06
            for: 15m
            labels:
              severity: warning
              component: keda-platform-slo
              slo: reconcile_success
            annotations:
              summary: KEDA reconcile SLO is burning error budget slowly (6x)
              description: |
                The 6h AND 1h error ratios are both above 6% — at this rate
                the 7d 1% error budget is consumed in ~28 hours. Worth
                investigating before it escalates to a fast-burn page.

          # Operator UP target: 99.9% / 7d ⇒ budget = 0.1%
          #   fast burn 14.4× ⇒ 0.0144  exhausts budget in ~12h
          #   slow burn  6×   ⇒ 0.006   exhausts budget in ~28h
          - alert: KedaPlatformOperatorUpBudgetBurnFast
            expr: |
              (1 - keda:operator_up:ratio_rate1h) > 0.0144
              and
              (1 - keda:operator_up:ratio_rate5m) > 0.0144
            for: 2m
            labels:
              severity: critical
              component: keda-platform-slo
              slo: operator_up
            annotations:
              summary: KEDA operator UP SLO is burning error budget fast (14.4x)
              description: |
                The 1h AND 5m unavailability for keda-operator scrapes are
                both above 1.44% — at this rate the 7d 0.1% budget is gone
                in ~12 hours. Suggests pod crash-looping, scrape failures, or
                node loss across both replicas. Inspect: kubectl -n
                platform-keda get pods -l app.kubernetes.io/name=keda-operator

          - alert: KedaPlatformOperatorUpBudgetBurnSlow
            expr: |
              (1 - keda:operator_up:ratio_rate6h) > 0.006
              and
              (1 - keda:operator_up:ratio_rate1h) > 0.006
            for: 15m
            labels:
              severity: warning
              component: keda-platform-slo
              slo: operator_up
            annotations:
              summary: KEDA operator UP SLO is burning error budget slowly (6x)
              description: |
                The 6h AND 1h unavailability for keda-operator scrapes are
                both above 0.6% — at this rate the 7d 0.1% budget is gone
                in ~28 hours. Look for flapping pods or scrape timeouts.

      - name: keda-control-plane
        interval: 30s
        rules:
          - alert: KedaOperatorDown
            expr: |
              absent(up{app_kubernetes_io_name="keda-operator"} == 1)
            for: 5m
            labels:
              severity: critical
              component: keda
            annotations:
              summary: KEDA operator is not being scraped or is down
              description: |
                Prometheus has no healthy `up==1` sample for the keda-operator
                pod for 5m. ScaledObjects will not reconcile.

          - alert: KedaMetricsApiServerDown
            expr: |
              absent(up{app_kubernetes_io_name="keda-operator-metrics-apiserver"} == 1)
            for: 5m
            labels:
              severity: critical
              component: keda
            annotations:
              summary: KEDA metrics API server is not being scraped or is down
              description: |
                The KEDA metrics adapter (external metrics API) is not reachable.
                HPAs that depend on KEDA external metrics will stop scaling.

          - alert: KedaAdmissionWebhooksDown
            expr: |
              absent(up{app_kubernetes_io_name="keda-admission-webhooks"} == 1)
            for: 10m
            labels:
              severity: warning
              component: keda
            annotations:
              summary: KEDA admission webhook is not being scraped or is down
              description: |
                The admission webhook validates ScaledObject/ScaledJob CRs on
                apply. With it down, mistakes only surface at runtime.

          - alert: KedaReconcileErrors
            expr: |
              sum by (controller) (
                rate(controller_runtime_reconcile_errors_total{app_kubernetes_io_name="keda-operator"}[5m])
              ) > 0
            for: 10m
            labels:
              severity: warning
              component: keda
            annotations:
              summary: KEDA controller {{ $labels.controller }} is reporting reconcile errors
              description: |
                controller-runtime is returning errors from Reconcile() for
                {{ $labels.controller }}. Check `kubectl -n platform-keda logs` on the
                operator for the underlying cause.

          - alert: KedaWorkqueueBacklog
            expr: |
              max by (name) (
                workqueue_depth{app_kubernetes_io_name="keda-operator"}
              ) > 25
            for: 10m
            labels:
              severity: warning
              component: keda
            annotations:
              summary: KEDA workqueue {{ $labels.name }} depth is sustained high
              description: |
                workqueue_depth for {{ $labels.name }} stayed above 25 items
                for 10m. The operator may be overloaded or wedged on a slow
                external scaler.

          # Kernel CFS throttling — fires when a KEDA container is hitting
          # its CPU limit hard enough that >10% of scheduling periods get
          # throttled, sustained 10m. Common cause: limit set too low for
          # the reconcile fan-out at scale; the operator stays UP but
          # reconciles slow down silently. Metric is from cAdvisor; only
          # populates for containers that actually have a CPU limit set.
          - alert: KedaContainerCpuThrottling
            expr: |
              100 *
              sum by (container, pod) (
                rate(container_cpu_cfs_throttled_periods_total{
                  namespace="platform-keda",
                  container=~"keda-operator|keda-operator-metrics-apiserver|keda-admission-webhooks"
                }[5m])
              )
              /
              sum by (container, pod) (
                rate(container_cpu_cfs_periods_total{
                  namespace="platform-keda",
                  container=~"keda-operator|keda-operator-metrics-apiserver|keda-admission-webhooks"
                }[5m])
              )
              > 10
            for: 10m
            labels:
              severity: warning
              component: keda
            annotations:
              summary: KEDA container {{ $labels.container }} is being CPU-throttled (>10%)
              description: |
                The CFS scheduler throttled {{ $labels.container }} (pod
                {{ $labels.pod }}) on more than 10% of its scheduling periods
                sustained 10m. Either bump the container's CPU limit or scale
                the deployment. Inspect:
                  kubectl describe pod -n platform-keda {{ $labels.pod }} | grep -A2 Limits
                  kubectl top pod -n platform-keda {{ $labels.pod }} --containers

          # Adapter -> operator gRPC channel signals two distinct problems:
          #
          #  1. The channel is up but returning errors (e.g. operator panics
          #     mid-RPC, scaler fails fast).
          #  2. The channel was carrying traffic, then went silent (e.g.
          #     mTLS cert expired, operator pod terminated mid-scrape, the
          #     network partitions). The "silence" condition is the more
          #     dangerous one because non-OK codes at least surface in
          #     status, while a wedged channel just stops sending.
          #
          # Both alerts are designed to NEVER fire when the lab has no
          # external trigger active — the silence rule's `> 0` precondition
          # against a 1h-offset window guarantees that.
          - alert: KedaAdapterToOperatorGrpcErrors
            expr: |
              sum by (grpc_method, grpc_code) (
                rate(keda_internal_metricsservice_grpc_server_handled_total{
                  grpc_code!="OK"
                }[5m])
              ) > 0
            for: 5m
            labels:
              severity: warning
              component: keda
            annotations:
              summary: KEDA metrics-apiserver -> operator gRPC is returning {{ $labels.grpc_code }}
              description: |
                The adapter -> operator gRPC channel ({{ $labels.grpc_method }})
                is returning non-OK codes. HPAs that depend on KEDA external
                metrics will get stale or empty values.

          - alert: KedaAdapterToOperatorGrpcSilence
            # "Had traffic, now silent" — fires only if there was sustained
            # traffic in the 10-minute window starting 15 minutes ago AND
            # the most recent 5 minutes have zero. A fresh cluster that has
            # never seen an external-trigger ScaledObject never trips this.
            expr: |
              (
                sum(rate(keda_internal_metricsservice_grpc_server_handled_total[10m] offset 15m)) > 0.01
              )
              and
              (
                sum(rate(keda_internal_metricsservice_grpc_server_handled_total[5m])) == 0
              )
            for: 5m
            labels:
              severity: critical
              component: keda
            annotations:
              summary: KEDA adapter -> operator gRPC went silent after sustained traffic
              description: |
                The adapter -> operator gRPC channel was active 15 minutes ago
                but has been completely silent for 5 minutes. This pattern
                matches an mTLS cert expiry, a wedged operator goroutine, or
                a network partition — none of which surface as non-OK codes
                because the call never lands. Inspect:
                  kubectl -n platform-keda logs deploy/keda-operator --tail=200
                  kubectl -n platform-keda logs deploy/keda-operator-metrics-apiserver --tail=200
                  kubectl -n platform-keda get secret kedaorg-certs -o jsonpath='{.data.tls\.crt}' | base64 -d | openssl x509 -noout -enddate

      - name: keda-scalers
        interval: 30s
        rules:
          - alert: KedaScaledObjectErrors
            expr: |
              sum by (scaledObject, exported_namespace) (
                rate(keda_scaled_object_errors_total[5m])
              ) > 0
            for: 5m
            labels:
              severity: warning
              component: keda
            annotations:
              summary: ScaledObject {{ $labels.exported_namespace }}/{{ $labels.scaledObject }} is failing to reconcile
              description: |
                keda_scaled_object_errors_total is increasing. Run
                `kubectl describe scaledobject -n {{ $labels.exported_namespace }} {{ $labels.scaledObject }}`
                to inspect the status condition.

          - alert: KedaScalerErrors
            expr: |
              sum by (scaledObject, scaler, exported_namespace) (
                rate(keda_scaler_detail_errors_total[5m])
              ) > 0.1
            for: 10m
            labels:
              severity: warning
              component: keda
            annotations:
              summary: KEDA scaler {{ $labels.scaler }} for {{ $labels.scaledObject }} is failing
              description: |
                Scaler {{ $labels.scaler }} on
                {{ $labels.exported_namespace }}/{{ $labels.scaledObject }} is returning
                errors > 0.1/s sustained 10m. Check the upstream trigger
                source (queue, prometheus, etc.).

          - alert: KedaScalerMetricsLatencyHigh
            expr: |
              max by (scaledObject, scaler, exported_namespace) (
                keda_scaler_metrics_latency_seconds
              ) > 1
            for: 10m
            labels:
              severity: warning
              component: keda
            annotations:
              summary: KEDA scaler {{ $labels.scaler }} latency is > 1s
              description: |
                Time to fetch the trigger metric exceeded 1s sustained 10m.
                Slow trigger reads delay scaling decisions.

          - alert: KedaScaledObjectAtMaxReplicas
            expr: |
              max by (horizontalpodautoscaler, namespace) (
                kube_horizontalpodautoscaler_status_current_replicas{horizontalpodautoscaler=~"keda-hpa-.*"}
              )
              ==
              max by (horizontalpodautoscaler, namespace) (
                kube_horizontalpodautoscaler_spec_max_replicas{horizontalpodautoscaler=~"keda-hpa-.*"}
              )
            for: 10m
            labels:
              severity: warning
              component: keda
            annotations:
              summary: KEDA-managed HPA {{ $labels.horizontalpodautoscaler }} is at max replicas
              description: |
                A KEDA-managed HPA in {{ $labels.namespace }} has been pinned at
                maxReplicaCount for 10m. Either load is genuinely above capacity,
                or the trigger threshold is too tight. Bump maxReplicaCount or
                tune the trigger.

          - alert: KedaOperatorLeaderChurn
            expr: |
              changes(leader_election_master_status{name=~".*keda.*"}[10m]) > 2
            for: 5m
            labels:
              severity: warning
              component: keda
            annotations:
              summary: KEDA operator leader election churning
              description: |
                The KEDA operator leader has changed > 2 times in 10m. Reconciles
                halt during transitions; investigate operator pod stability
                (OOM, liveness probe, network).

          - alert: KedaCertNearExpiry
            expr: |
              (min(certmanager_certificate_expiration_timestamp_seconds{namespace="platform-keda"}) - time()) / 86400 < 14
            for: 1h
            labels:
              severity: warning
              component: keda
            annotations:
              summary: A KEDA cert-manager certificate expires in < 14 days
              description: |
                At least one KEDA TLS cert expires in under 14 days. Renewal
                should be automatic via cert-manager — verify by checking
                certmanager_certificate_renewal_timestamp_seconds.

      - name: demo-cpu-workload
        interval: 30s
        rules:
          - alert: DemoCpuAtMaxReplicas
            expr: |
              max by (horizontalpodautoscaler, namespace) (
                kube_horizontalpodautoscaler_status_current_replicas{namespace="demo-cpu"}
              )
              ==
              max by (horizontalpodautoscaler, namespace) (
                kube_horizontalpodautoscaler_spec_max_replicas{namespace="demo-cpu"}
              )
            for: 10m
            labels:
              severity: warning
              component: demo
            annotations:
              summary: Demo HPA {{ $labels.horizontalpodautoscaler }} is pinned at max replicas
              description: |
                The CPU demo has been at its maxReplicaCount for 10m. Either
                load is genuinely above capacity, or the trigger threshold
                is too tight. Bump maxReplicaCount in scaledobject.yaml or
                tune the CPU trigger value.

          - alert: DemoCpuPodsPending
            expr: |
              sum(kube_pod_status_phase{namespace="demo-cpu", phase="Pending"}) > 0
            for: 5m
            labels:
              severity: warning
              component: demo
            annotations:
              summary: Demo workload has pods stuck Pending
              description: |
                One or more demo-cpu pods have been Pending for 5m. The kind
                lab is small — the cluster may be out of CPU. Check
                `kubectl describe pod` for scheduling events.

      # keda-deprecation-webhook (KDW) — alerts on the lint webhook itself.
      # See docs/superpowers/specs/2026-05-05-keda-deprecation-webhook-design.md
      # for the design and SLO motivation.
      - name: keda-deprecations
        interval: 30s
        rules:
          - alert: KedaDeprecationWebhookDown
            expr: up{job="kubernetes-service-endpoints", service="keda-deprecation-webhook"} == 0
            for: 5m
            labels:
              severity: critical
              component: keda-deprecation-webhook
            annotations:
              summary: keda-deprecation-webhook is unreachable
              description: |
                failurePolicy=Ignore — deprecated specs may slip through during this outage.
                Controller path will eventually surface them via keda_deprecation_violations.

          - alert: KedaDeprecationConfigReloadFailing
            expr: increase(keda_deprecation_config_reloads_total{result="error"}[10m]) > 0
            for: 0m
            labels:
              severity: warning
              component: keda-deprecation-webhook
            annotations:
              summary: keda-deprecation-webhook ConfigMap is invalid
              description: |
                Last good config still in use. Inspect events on the ConfigMap and fix.

          - alert: KedaDeprecationErrorViolationsPresent
            expr: sum(keda_deprecation_violations{severity="error"}) > 0
            for: 1h
            labels:
              severity: warning
              component: keda-deprecation-webhook
            annotations:
              summary: '{{ $value }} ScaledObject(s) still have severity=error deprecation violations'
              description: |
                These will break on KEDA 2.18. Review the KEDA Deprecations dashboard for the list.
